on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          # - os: windows-latest
          #   arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure and Build
        working-directory: ./cpp
        run: |
          xmake f -m release -a ${{ matrix.arch }} -y
          xmake

      # - name: Dummy Build Step
      #   run: |
      #     mkdir -p cpp/build/${{ matrix.os }}/${{ matrix.arch }}/release/
      #     echo "Debug build for ${{ matrix.os }} ${{ matrix.arch }}" > cpp/build/${{ matrix.os }}/${{ matrix.arch }}/release/dummy.a
      #     ls -R cpp/build/

      - name: Upload to Actions Storage
        uses: actions/upload-artifact@v4
        with:
          name: libpinocchio-${{ matrix.os }}-${{ matrix.arch }}
          path: cpp/build/**/release/*.a
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      - name: Rename artifacts for release
        run: |
          find ./artifacts -name "*.a" | while read f; do
            dir=$(dirname "$f")
            artifact_name=$(echo "$dir" | sed 's|./artifacts/||' | cut -d'/' -f1)
            mv "$f" "$dir/${artifact_name}.a"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
