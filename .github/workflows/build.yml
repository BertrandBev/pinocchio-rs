name: Build Matrix

on:
  push:
    branches:
      - master
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, x86]
        exclude:
          - os: macos-latest
            arch: x86

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup@v1
        with:
          xmake-version: latest

      - name: Configure
        run: xmake f -a ${{ matrix.arch }} -y

      - name: Build
        run: xmake
